services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config", "/etc/otelcol/config.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-14317}:4317"   # OTLP gRPC
      - "${OTEL_HTTP_PORT:-14318}:4318"    # OTLP HTTP
      - "8889:8889"                         # Prometheus metrics
    environment:
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-0.0.0.0}
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.8.0
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    volumes:
      - ./config/alloy.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "${FARO_PORT:-12347}:12347"   # Faro receiver
      - "${ALLOY_UI_PORT:-12345}:12345"  # Alloy UI
    environment:
      - FARO_CORS_ALLOWED_ORIGINS=${FARO_CORS_ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:3000}
    depends_on:
      - otel-collector
      - loki
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.0
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    environment:
      - TEMPO_RETENTION_PERIOD=${TEMPO_RETENTION_PERIOD:-168h}
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.0
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./config/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3101}:3100"
    environment:
      - LOKI_RETENTION_PERIOD=${LOKI_RETENTION_PERIOD:-168h}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9099}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.0
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-http://localhost:3002}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
