<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<title>Agent Team</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="xterm.css">
<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
</head>
<body>

<!-- Draggable title bar -->
<div class="titlebar">
  <span id="health-text">Agent Team</span>
  <div class="titlebar-actions">
    <button class="titlebar-btn" id="btn-settings">Settings</button>
  </div>
</div>

<!-- Main layout: Sidebar (left) | Main Area (center+right) -->
<div class="layout">

  <!-- Left: Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-header-title">Agent Team</span>
      <div class="sidebar-header-actions">
        <button class="btn-icon" id="btn-refresh-sidebar" title="Refresh">&#8635;</button>
        <button class="btn-icon" id="btn-sidebar-settings" title="Settings">&#9881;</button>
      </div>
    </div>
    <div class="sidebar-scroll">
      <!-- Inbox -->
      <div class="sidebar-section">
        <div class="sidebar-inbox-item" id="inbox-item">
          <span>Pending Approvals</span>
          <span class="inbox-badge" id="inbox-badge">0</span>
        </div>
      </div>
      <!-- Repos accordion -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Repos</div>
        <div class="repos-list" id="repos-list"></div>
      </div>
      <!-- Tasks -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Tasks</div>
        <div class="bounty-summary" id="bounties-summary"></div>
        <div class="bounty-list" id="bounties-list">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Center: Main area -->
  <div class="main-area">
    <!-- Breadcrumb -->
    <div class="breadcrumb-bar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-active">Dashboard</span>
      </div>
      <div class="breadcrumb-shortcuts">
        <span><kbd class="kbd">&#8984;K</kbd> search</span>
        <span><kbd class="kbd">1-9</kbd> switch</span>
        <span><kbd class="kbd">N</kbd> new</span>
        <span><kbd class="kbd">Esc</kbd> deselect</span>
        <span><kbd class="kbd">R</kbd> refresh</span>
      </div>
    </div>
    <!-- Content zone: main content + properties panel -->
    <div class="content-zone">
      <div class="main-content">
        <div class="terminal" id="terminal">
          <!-- Dashboard or terminal rendered here -->
        </div>
      </div>
      <!-- Properties panel (slides in when agent selected) -->
      <div class="properties-panel" id="properties-panel">
        <div class="properties-header">
          <span class="properties-header-title" id="props-title">Agent</span>
          <button class="btn-icon" id="btn-close-props">&times;</button>
        </div>
        <div class="properties-scroll" id="properties-scroll"></div>
        <div class="props-actions" id="props-actions"></div>
      </div>
    </div>
  </div>

</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span>Settings</span>
      <button class="btn-icon" id="btn-close-settings">&times;</button>
    </div>
    <div class="modal-body">
      <div class="side-field">
        <label>GitHub Personal Access Token</label>
        <div class="token-row">
          <input type="password" id="input-gh-token" placeholder="ghp_...">
          <button class="btn btn-sm" id="btn-save-token">Save</button>
        </div>
        <div class="side-hint">Stored locally in ~/.agent-team/tracker.json</div>
      </div>
      <div class="side-field">
        <label>Tracked Repos</label>
        <div class="token-row">
          <input type="text" id="input-add-repo" placeholder="owner/repo or owner">
          <button class="btn btn-sm" id="btn-add-repo">Add</button>
        </div>
        <div class="side-hint">Enter owner/repo for one repo, or just owner for all repos</div>
        <div id="settings-repo-list" class="settings-repo-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Role picker popup -->
<div class="role-picker" id="role-picker" style="display:none">
  <div class="role-picker-title">Create Agent</div>
  <div class="role-picker-grid" id="role-picker-grid"></div>
</div>

<script>
const api = window.bridge;

const ROLES = ['be', 'fe', 'ops', 'arch', 'design', 'qa', 'debug'];

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let activeAgentId = null;
let agents = {};
let trackerState = null;
let collapsedRepos = {};

const terminals = {};

// ---------------------------------------------------------------------------
// Role picker
// ---------------------------------------------------------------------------
let pickerRepo = null;

function showRolePicker(repoSlug, anchorEl) {
  pickerRepo = repoSlug;
  const picker = document.getElementById('role-picker');
  const grid = document.getElementById('role-picker-grid');
  grid.innerHTML = ROLES.map(r =>
    `<button class="role-picker-btn" data-role="${r}">${r.toUpperCase()}</button>`
  ).join('');
  const rect = anchorEl.getBoundingClientRect();
  picker.style.top = rect.bottom + 4 + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  picker.style.display = 'block';
}

function hideRolePicker() {
  document.getElementById('role-picker').style.display = 'none';
  pickerRepo = null;
}

document.getElementById('role-picker-grid').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-role]');
  if (!btn || !pickerRepo) return;
  const role = btn.dataset.role;
  const repo = pickerRepo;
  hideRolePicker();
  try {
    const result = await api.createAgent(role, repo);
    if (result.ok) {
      setTimeout(async () => {
        await refreshAgents();
        selectAgent(result.agent_id);
      }, 300);
    }
  } catch (err) {
    console.error('createAgent error:', err);
  }
});

document.addEventListener('click', (e) => {
  const picker = document.getElementById('role-picker');
  if (picker.style.display !== 'none' && !picker.contains(e.target) && !e.target.closest('.repo-group-add')) {
    hideRolePicker();
  }
});

// ---------------------------------------------------------------------------
// Settings modal
// ---------------------------------------------------------------------------

function openSettings() {
  const modal = document.getElementById('settings-modal');
  modal.style.display = modal.style.display === 'none' ? 'flex' : 'none';
  renderSettingsRepos();
}

document.getElementById('btn-settings').addEventListener('click', openSettings);
document.getElementById('btn-sidebar-settings').addEventListener('click', openSettings);

document.getElementById('btn-close-settings').addEventListener('click', () => {
  document.getElementById('settings-modal').style.display = 'none';
});

document.getElementById('settings-modal').addEventListener('click', (e) => {
  if (e.target.id === 'settings-modal') e.target.style.display = 'none';
});

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------

function formatUptime(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  const rm = m % 60;
  return `${h}h${rm > 0 ? rm + 'm' : ''}`;
}

function statusDot(status) {
  if (['polling', 'working', 'sleeping'].includes(status)) return 'dot-ok';
  if (status === 'starting' || status === 'restarting') return 'dot-info';
  if (status === 'rate_limited') return 'dot-warn';
  if (status === 'error') return 'dot-error';
  return 'dot-dead';
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getAllAgentsList() {
  return Object.values(agents);
}

// ---------------------------------------------------------------------------
// Breadcrumb
// ---------------------------------------------------------------------------

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  if (!activeAgentId) {
    el.innerHTML = '<span class="breadcrumb-active">Dashboard</span>';
    return;
  }
  const agent = agents[activeAgentId];
  if (!agent) {
    el.innerHTML = '<span class="breadcrumb-active">Dashboard</span>';
    return;
  }
  const repoName = agent.repo ? (agent.repo.split('/')[1] || agent.repo) : '?';
  const roleName = agent.role ? agent.role.toUpperCase() : '?';
  const taskHtml = agent.current_task
    ? `<span class="breadcrumb-sep">/</span><span class="breadcrumb-active">#${agent.current_task.number}</span>`
    : '';
  el.innerHTML = `
    <span>${escapeHtml(repoName)}</span>
    <span class="breadcrumb-sep">/</span>
    <span>${roleName}</span>
    ${taskHtml}
  `;
}

// ---------------------------------------------------------------------------
// Dashboard (no agent selected)
// ---------------------------------------------------------------------------

function renderDashboard() {
  const agentList = getAllAgentsList();
  const alive = agentList.filter(a => !['dead', 'error'].includes(a.status)).length;
  const total = agentList.length;
  const cost = agentList.reduce((s, a) => s + (a.cost_usd || 0), 0);

  let readyCount = 0;
  const statusCounts = {};
  if (trackerState && trackerState.repo_statuses) {
    for (const rs of trackerState.repo_statuses) {
      for (const issue of (rs.issues || [])) {
        const agentLabel = issue.labels.find(l => l.startsWith('agent:'));
        if (!agentLabel) continue;
        const statusLabel = issue.labels.find(l => l.startsWith('status:')) || '';
        const status = statusLabel.replace('status:', '') || 'open';
        statusCounts[status] = (statusCounts[status] || 0) + 1;
        if (status === 'ready') readyCount++;
      }
    }
  }

  let statusBadges = '';
  for (const [status, count] of Object.entries(statusCounts)) {
    const cls = { ready: 'badge-green', 'in-progress': 'badge-purple', blocked: 'badge-yellow', review: 'badge-blue' }[status] || '';
    statusBadges += `<span class="badge ${cls}">${count} ${status}</span> `;
  }

  return `
    <div class="dashboard">
      <div class="dashboard-cards">
        <div class="dashboard-card">
          <div class="dashboard-card-label">Agents</div>
          <div class="dashboard-card-value">${alive}/${total}</div>
        </div>
        <div class="dashboard-card">
          <div class="dashboard-card-label">Total Cost</div>
          <div class="dashboard-card-value">$${cost.toFixed(2)}</div>
        </div>
        <div class="dashboard-card">
          <div class="dashboard-card-label">Tasks Ready</div>
          <div class="dashboard-card-value">${readyCount}</div>
        </div>
      </div>
      ${statusBadges ? `<div class="dashboard-section-title">Task Status</div><div style="padding:0 0 16px;display:flex;gap:6px;flex-wrap:wrap">${statusBadges}</div>` : ''}
    </div>
  `;
}

// ---------------------------------------------------------------------------
// Properties panel (right, agent details)
// ---------------------------------------------------------------------------

function renderProperties() {
  const panel = document.getElementById('properties-panel');
  const scroll = document.getElementById('properties-scroll');
  const actions = document.getElementById('props-actions');
  const title = document.getElementById('props-title');

  if (!activeAgentId) {
    panel.classList.remove('open');
    return;
  }

  const agent = agents[activeAgentId];
  if (!agent) {
    panel.classList.remove('open');
    return;
  }

  panel.classList.add('open');
  title.textContent = `${agent.role.toUpperCase()} Agent`;

  const alive = !['dead', 'error'].includes(agent.status);
  const healthClass = alive ? 'health-alive' : 'health-dead';
  const dot = statusDot(agent.status);
  const uptime = agent.created_at ? formatUptime(Date.now() - agent.created_at) : '-';

  // Cost bar
  const costUsd = agent.cost_usd || 0;
  const maxBudget = 10;
  const costPct = Math.min((costUsd / maxBudget) * 100, 100);
  let costBarClass = '';
  if (costPct > 80) costBarClass = 'danger';
  else if (costPct > 60) costBarClass = 'warning';

  // Current task
  let taskHtml = '<span class="props-value" style="color:#555">None</span>';
  if (agent.current_task) {
    const t = agent.current_task;
    const url = t.url || `https://github.com/${agent.repo}/issues/${t.number}`;
    taskHtml = `<a href="${url}" target="_blank" style="color:#60a5fa;text-decoration:none;font-size:11px">#${t.number} ${escapeHtml(t.title || '')}</a>`;
  }

  scroll.innerHTML = `
    <div class="props-section">
      <div class="props-section-title">Info</div>
      <div class="props-row">
        <span class="props-label">Role</span>
        <span class="props-value">${agent.role.toUpperCase()}</span>
      </div>
      <div class="props-row">
        <span class="props-label">ID</span>
        <span class="props-value" style="font-size:10px">${escapeHtml(agent.agent_id)}</span>
      </div>
      <div class="props-row">
        <span class="props-label">Status</span>
        <span class="props-value"><span class="${dot}" style="margin-right:4px">&#9679;</span>${agent.status}</span>
      </div>
      <div class="props-row">
        <span class="props-label">Uptime</span>
        <span class="props-value">${uptime}</span>
      </div>
      <div class="props-row">
        <span class="props-label">Cycle</span>
        <span class="props-value">#${agent.cycle || 0}</span>
      </div>
      <div class="props-row">
        <span class="props-label">Restarts</span>
        <span class="props-value">${agent.restarts || 0}</span>
      </div>
    </div>
    <div class="props-section">
      <div class="props-section-title">Cost</div>
      <div class="props-row">
        <span class="props-label">Spent</span>
        <span class="props-value">$${costUsd.toFixed(2)} / $${maxBudget.toFixed(2)}</span>
      </div>
      <div class="cost-bar-track">
        <div class="cost-bar-fill ${costBarClass}" style="width:${costPct}%"></div>
      </div>
    </div>
    <div class="props-section">
      <div class="props-section-title">Current Task</div>
      <div style="padding:2px 0">${taskHtml}</div>
    </div>
  `;

  actions.innerHTML = `
    <button class="btn-action btn-action-stop" data-stop-agent="${agent.agent_id}">Stop</button>
    <button class="btn-action btn-action-restart" data-restart-agent="${agent.agent_id}">Restart</button>
  `;
}

document.getElementById('props-actions').addEventListener('click', async (e) => {
  const stopBtn = e.target.closest('[data-stop-agent]');
  if (stopBtn) {
    await stopAgent(stopBtn.dataset.stopAgent);
    return;
  }
  const restartBtn = e.target.closest('[data-restart-agent]');
  if (restartBtn) {
    const id = restartBtn.dataset.restartAgent;
    const agent = agents[id];
    if (agent) {
      await api.restartAgent(id);
      await refreshAgents();
    }
  }
});

document.getElementById('btn-close-props').addEventListener('click', () => {
  activeAgentId = null;
  renderAll();
});

// ---------------------------------------------------------------------------
// Tasks panel (sidebar)
// ---------------------------------------------------------------------------

function renderBounties() {
  if (!trackerState) return;

  const tasks = [];
  for (const rs of (trackerState.repo_statuses || [])) {
    for (const issue of (rs.issues || [])) {
      const agentLabel = issue.labels.find(l => l.startsWith('agent:'));
      if (!agentLabel) continue;
      const statusLabel = issue.labels.find(l => l.startsWith('status:')) || '';
      const status = statusLabel.replace('status:', '') || 'open';
      tasks.push({ ...issue, _repo: rs.slug, agent_type: agentLabel.replace('agent:', ''), status });
    }
  }

  const summaryEl = document.getElementById('bounties-summary');
  const ready = tasks.filter(t => t.status === 'ready').length;
  const blocked = tasks.filter(t => t.status === 'blocked').length;
  const review = tasks.filter(t => t.status === 'review').length;
  const inProgress = tasks.filter(t => t.status === 'in-progress').length;
  summaryEl.innerHTML = `
    <span class="badge badge-green">${ready} ready</span>
    <span class="badge badge-purple">${inProgress} active</span>
    <span class="badge badge-yellow">${blocked} blocked</span>
    <span class="badge badge-blue">${review} review</span>
  `;

  const listEl = document.getElementById('bounties-list');
  if (tasks.length > 0) {
    const sorted = [...tasks].sort((a, b) => {
      const order = { ready: 0, 'in-progress': 1, blocked: 2, review: 3, done: 4 };
      return (order[a.status] ?? 5) - (order[b.status] ?? 5);
    });
    listEl.innerHTML = sorted.slice(0, 50).map(t => {
      const statusCls = { ready: 'badge-green', 'in-progress': 'badge-purple', blocked: 'badge-yellow', review: 'badge-blue' }[t.status] || '';
      const repo = (t._repo || '').split('/')[1] || '';
      return `
        <a class="side-item side-link" href="${t.url}" target="_blank">
          <div class="side-item-title">#${t.number} ${escapeHtml(t.title || '')}</div>
          <div class="side-item-meta">
            <span class="badge ${statusCls}">${t.status}</span>
            <span class="badge">${t.agent_type}</span>
            <span class="side-muted">${repo}</span>
          </div>
        </a>
      `;
    }).join('');
  } else if (trackerState.error) {
    listEl.innerHTML = `<div class="side-muted" style="padding:8px">${escapeHtml(trackerState.error)}</div>`;
  } else {
    listEl.innerHTML = '<div class="side-muted" style="padding:8px">No tasks</div>';
  }
}

// ---------------------------------------------------------------------------
// Repos + Agents (sidebar accordion)
// ---------------------------------------------------------------------------

let lastReposKey = '';

function renderRepos() {
  const listEl = document.getElementById('repos-list');
  const agentList = getAllAgentsList();

  const repoSet = new Set();
  if (trackerState && trackerState.repos) {
    for (const r of trackerState.repos) {
      repoSet.add(typeof r === 'string' ? r : r.slug);
    }
  }
  for (const a of agentList) {
    if (a.repo) repoSet.add(a.repo);
  }
  const allRepos = [...repoSet];

  const repoInfo = {};
  if (trackerState && trackerState.repo_statuses) {
    for (const rs of trackerState.repo_statuses) {
      repoInfo[rs.slug] = rs;
    }
  }

  const byRepo = {};
  for (const repo of allRepos) byRepo[repo] = [];
  for (const a of agentList) {
    const repo = a.repo || 'unknown';
    if (!byRepo[repo]) byRepo[repo] = [];
    byRepo[repo].push(a);
  }

  const reposKey = JSON.stringify({ allRepos, ag: agentList.map(a => `${a.agent_id}:${a.status}:${a.cycle}`), activeAgentId, collapsedRepos });
  if (reposKey === lastReposKey) return;
  lastReposKey = reposKey;

  if (allRepos.length === 0) {
    listEl.innerHTML = '<div style="padding:20px 10px;color:#444;font-size:11px;text-align:center">No repos registered</div>';
    return;
  }

  let html = '';
  for (const repo of allRepos) {
    const repoAgents = byRepo[repo] || [];
    const repoName = repo.split('/')[1] || repo;
    const isCollapsed = collapsedRepos[repo];
    const aliveCount = repoAgents.filter(a => !['dead', 'error'].includes(a.status)).length;
    const rs = repoInfo[repo];
    const ghBase = `https://github.com/${repo}`;

    const summaryParts = [];
    if (repoAgents.length > 0) summaryParts.push(`${aliveCount} agent${aliveCount !== 1 ? 's' : ''}`);
    if (rs && rs.tasks.ready > 0) summaryParts.push(`${rs.tasks.ready} ready`);
    if (rs && rs.issues_open > 0) summaryParts.push(`${rs.issues_open} issues`);
    const summaryText = summaryParts.join(' \u00b7 ') || 'empty';

    html += `
      <div class="repo-group ${isCollapsed ? '' : 'repo-group-open'}">
        <div class="repo-group-header" data-repo="${repo}">
          <span class="repo-group-chevron ${isCollapsed ? 'collapsed' : ''}">&#9662;</span>
          <div class="repo-group-title">
            <span class="repo-group-name">${escapeHtml(repoName)}</span>
            <span class="repo-group-summary">${summaryText}</span>
          </div>
          <button class="repo-group-add" data-add-repo="${repo}" title="Add agent">+</button>
        </div>
    `;

    if (!isCollapsed) {
      html += '<div class="repo-group-body">';

      html += `
        <div class="repo-detail-links">
          <a href="${ghBase}" target="_blank">GitHub</a>
          <a href="${ghBase}/issues" target="_blank">${rs ? rs.issues_open : '?'} issues</a>
          <a href="${ghBase}/pulls" target="_blank">${rs ? rs.prs_open : '?'} PRs</a>
        </div>
      `;

      if (rs && rs.tasks.total > 0) {
        const agentIssues = (rs.issues || []).filter(i => i.labels.some(l => l.startsWith('agent:')));
        if (agentIssues.length > 0) {
          html += '<div class="repo-detail-section-title">Active Tasks</div>';
          for (const issue of agentIssues.slice(0, 8)) {
            const statusLabel = issue.labels.find(l => l.startsWith('status:'));
            const status = statusLabel ? statusLabel.replace('status:', '') : 'open';
            const statusCls = { ready: 'badge-green', 'in-progress': 'badge-purple', blocked: 'badge-yellow', review: 'badge-blue' }[status] || '';
            html += `
              <a class="repo-detail-item side-link" href="${issue.url}" target="_blank">
                <span class="repo-detail-item-title">#${issue.number} ${escapeHtml(issue.title || '')}</span>
                <span class="badge ${statusCls}">${status}</span>
              </a>
            `;
          }
        }
      }

      if (repoAgents.length > 0) {
        html += '<div class="repo-detail-section-title">Agents</div>';
        for (const a of repoAgents) {
          const isActive = a.agent_id === activeAgentId;
          const alive = !['dead', 'error'].includes(a.status);
          const healthClass = alive ? 'health-alive' : 'health-dead';
          const dot = statusDot(a.status);
          const uptime = a.created_at ? formatUptime(Date.now() - a.created_at) : '';

          html += `
            <div class="agent-tab ${isActive ? 'agent-tab-active' : ''} ${a.status === 'dead' ? 'agent-tab-dead' : ''}"
                 data-agent-id="${a.agent_id}">
              <span class="agent-tab-health ${healthClass}"></span>
              <div class="agent-tab-info">
                <span class="agent-tab-role">${a.role.toUpperCase()} #${a.cycle || 0}</span>
                <span class="agent-tab-meta">
                  <span class="agent-tab-id">${a.agent_id}</span>
                  <span class="agent-tab-uptime">${uptime}</span>
                </span>
              </div>
              <span class="agent-tab-status ${dot}">&bull;</span>
              <button class="agent-tab-close" data-close-agent="${a.agent_id}">&times;</button>
            </div>
          `;
        }
      }

      if (repoAgents.length === 0 && (!rs || rs.tasks.total === 0)) {
        html += '<div class="repo-group-empty">No activity</div>';
      }

      html += '</div>';
    }

    html += '</div>';
  }

  listEl.innerHTML = html;
}

// Event delegation for repos list (sidebar)
document.getElementById('repos-list').addEventListener('click', (e) => {
  const addBtn = e.target.closest('[data-add-repo]');
  if (addBtn) {
    e.stopPropagation();
    showRolePicker(addBtn.dataset.addRepo, addBtn);
    return;
  }
  const closeBtn = e.target.closest('[data-close-agent]');
  if (closeBtn) {
    e.stopPropagation();
    stopAgent(closeBtn.dataset.closeAgent);
    return;
  }
  const repoHeader = e.target.closest('.repo-group-header');
  if (repoHeader && !e.target.closest('.repo-group-add')) {
    const repo = repoHeader.dataset.repo;
    collapsedRepos[repo] = !collapsedRepos[repo];
    lastReposKey = '';
    renderRepos();
    return;
  }
  const tab = e.target.closest('.agent-tab');
  if (tab) selectAgent(tab.dataset.agentId);
});

// ---------------------------------------------------------------------------
// Terminal
// ---------------------------------------------------------------------------

function getOrCreateTerminal(agentId) {
  if (terminals[agentId]) return terminals[agentId];

  const term = new window.Terminal({
    theme: {
      background: '#0e0e0e',
      foreground: '#e0e0e0',
      cursor: '#4ade80',
      selectionBackground: '#4ade8033',
    },
    fontSize: 12,
    fontFamily: 'Menlo, Monaco, "Courier New", monospace',
    cursorBlink: true,
    scrollback: 5000,
    convertEol: true,
  });

  const fitAddon = new window.FitAddon.FitAddon();
  term.loadAddon(fitAddon);

  term.onData((data) => {
    api.writeAgentInput(agentId, data);
  });

  terminals[agentId] = { term, fitAddon };
  return terminals[agentId];
}

function renderTerminal() {
  const container = document.getElementById('terminal');

  if (!activeAgentId) {
    // Show dashboard
    Object.values(terminals).forEach(t => { if (t.term.element) t.term.element.parentElement.style.display = 'none'; });
    container.innerHTML = renderDashboard();
    return;
  }

  const { term, fitAddon } = getOrCreateTerminal(activeAgentId);

  // Hide dashboard / welcome
  const dashboard = container.querySelector('.dashboard');
  if (dashboard) dashboard.remove();
  const welcome = container.querySelector('.terminal-welcome');
  if (welcome) welcome.remove();

  Object.entries(terminals).forEach(([id, t]) => {
    if (t.term.element && t.term.element.parentElement) {
      t.term.element.parentElement.style.display = id === activeAgentId ? '' : 'none';
    }
  });

  if (!term.element) {
    const wrapper = document.createElement('div');
    wrapper.className = 'xterm-wrapper';
    wrapper.dataset.agentId = activeAgentId;
    container.appendChild(wrapper);
    term.open(wrapper);
    fitAddon.fit();
  } else if (!term.element.parentElement.parentElement) {
    container.appendChild(term.element.parentElement);
  }

  term.element.parentElement.style.display = '';
  fitAddon.fit();
  term.focus();
}

function updateHealthBar() {
  const ht = document.getElementById('health-text');
  const agentList = getAllAgentsList();
  const alive = agentList.filter(a => !['dead','restarting'].includes(a.status)).length;
  const total = agentList.length;
  const cost = agentList.reduce((s, a) => s + (a.cost_usd || 0), 0);

  const parts = [];
  if (total > 0) parts.push(`${alive}/${total} alive`);
  if (cost > 0) parts.push(`$${cost.toFixed(2)}`);
  if (trackerState && trackerState.repo_statuses) {
    const ready = trackerState.repo_statuses.reduce((s, rs) => s + (rs.tasks?.ready || 0), 0);
    if (ready > 0) parts.push(`${ready} tasks ready`);
  }
  ht.textContent = parts.length > 0 ? parts.join(' \u00b7 ') : 'Agent Team';
}

// ---------------------------------------------------------------------------
// Render all
// ---------------------------------------------------------------------------

function renderAll() {
  renderBreadcrumb();
  renderRepos();
  renderTerminal();
  renderProperties();
  updateHealthBar();
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

async function selectAgent(id) {
  activeAgentId = id;
  renderAll();
}

async function stopAgent(id) {
  await api.stopAgent(id);
  if (terminals[id]) {
    const wrapper = terminals[id].term.element?.parentElement;
    terminals[id].term.dispose();
    if (wrapper) wrapper.remove();
    delete terminals[id];
  }
  lastReposKey = '';
  delete agents[id];
  if (activeAgentId === id) {
    const remaining = Object.keys(agents);
    activeAgentId = remaining.length > 0 ? remaining[0] : null;
  }
  await refreshAgents();
  renderAll();
}

async function refreshAgents() {
  const list = await api.getAgents();
  agents = {};
  for (const a of list) agents[a.agent_id] = a;
  renderAll();
}

// ---------------------------------------------------------------------------
// Keyboard shortcuts
// ---------------------------------------------------------------------------

document.addEventListener('keydown', (e) => {
  // Ignore when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  // Cmd+K → command palette placeholder
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    alert('Command palette coming soon');
    return;
  }

  // 1-9 → select nth agent
  if (e.key >= '1' && e.key <= '9' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const agentList = getAllAgentsList();
    const idx = parseInt(e.key) - 1;
    if (idx < agentList.length) {
      selectAgent(agentList[idx].agent_id);
    }
    return;
  }

  // N → create agent (show role picker for first repo)
  if (e.key === 'n' || e.key === 'N') {
    if (!e.metaKey && !e.ctrlKey) {
      const allRepos = (trackerState && trackerState.repos) ? trackerState.repos : [];
      if (allRepos.length > 0) {
        const firstAddBtn = document.querySelector('[data-add-repo]');
        if (firstAddBtn) showRolePicker(allRepos[0], firstAddBtn);
      }
    }
    return;
  }

  // Esc → deselect agent
  if (e.key === 'Escape') {
    // Close modals first
    const modal = document.getElementById('settings-modal');
    if (modal.style.display !== 'none') {
      modal.style.display = 'none';
      return;
    }
    const picker = document.getElementById('role-picker');
    if (picker.style.display !== 'none') {
      hideRolePicker();
      return;
    }
    activeAgentId = null;
    renderAll();
    return;
  }

  // R → refresh
  if ((e.key === 'r' || e.key === 'R') && !e.metaKey && !e.ctrlKey) {
    refreshAgents();
    api.refreshTracker();
    return;
  }
});

// ---------------------------------------------------------------------------
// Real-time events
// ---------------------------------------------------------------------------

api.onPtyData((agentId, data) => {
  const t = getOrCreateTerminal(agentId);
  t.term.write(data);
});

api.onStatusUpdate((agentId, data) => {
  if (data) {
    agents[agentId] = data;
    if (!activeAgentId) selectAgent(agentId);
  }
  renderAll();
});

api.onTrackerUpdate((state) => {
  trackerState = state;
  renderBounties();
  renderAll();
});

new ResizeObserver(() => {
  if (activeAgentId && terminals[activeAgentId]) {
    terminals[activeAgentId].fitAddon.fit();
  }
}).observe(document.getElementById('terminal'));

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

document.getElementById('btn-save-token').addEventListener('click', () => {
  const token = document.getElementById('input-gh-token').value.trim();
  api.setGitHubToken(token);
  document.getElementById('input-gh-token').value = '';
  document.getElementById('input-gh-token').placeholder = '••••••••  (saved)';
});

document.getElementById('btn-add-repo').addEventListener('click', () => {
  const input = document.getElementById('input-add-repo');
  const slug = input.value.trim();
  if (slug) {
    api.addRepo(slug);
    input.value = '';
    setTimeout(renderSettingsRepos, 300);
  }
});

document.getElementById('input-add-repo').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btn-add-repo').click();
});

function renderSettingsRepos() {
  const el = document.getElementById('settings-repo-list');
  const entries = (trackerState && trackerState.tracked_entries) || [];
  if (entries.length === 0) {
    el.innerHTML = '<div class="side-muted" style="padding:4px 0">No repos tracked</div>';
    return;
  }
  el.innerHTML = entries.map(entry => {
    const isUser = !entry.includes('/');
    const label = isUser ? `${escapeHtml(entry)} (all repos)` : escapeHtml(entry);
    return `
      <div class="settings-repo-item">
        <span>${label}</span>
        <button class="btn-icon settings-repo-remove" data-remove-repo="${entry}">&times;</button>
      </div>
    `;
  }).join('');
}

document.getElementById('settings-repo-list').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-remove-repo]');
  if (btn) {
    api.removeRepo(btn.dataset.removeRepo);
    setTimeout(renderSettingsRepos, 300);
  }
});

document.getElementById('btn-refresh-sidebar').addEventListener('click', () => {
  refreshAgents();
  api.refreshTracker();
});

refreshAgents();
api.getTracker().then(state => {
  trackerState = state;
  renderAll();
  renderBounties();
});
setInterval(refreshAgents, 10_000);
setInterval(() => {
  document.querySelectorAll('.agent-tab-uptime').forEach(el => {
    const tab = el.closest('.agent-tab');
    if (!tab) return;
    const agentId = tab.dataset.agentId;
    const a = agents[agentId];
    if (a && a.created_at) {
      el.textContent = formatUptime(Date.now() - a.created_at);
    }
  });
  // Update properties uptime live
  if (activeAgentId) renderProperties();
}, 1000);

</script>

</body>
