<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<title>Agent Team</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="xterm.css">
<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
</head>
<body>

<!-- Draggable title bar -->
<div class="titlebar">
  <span id="health-text">Agent Team</span>
  <div class="titlebar-actions">
    <button class="titlebar-btn" id="btn-settings">Settings</button>
  </div>
</div>

<!-- Main layout: Bounties (left) | Terminal (center) | Repos (right) -->
<div class="layout">

  <!-- Left: Bounties panel (always visible) -->
  <div class="bounty-panel">
    <div class="panel-header">
      <span class="panel-title">Bounties</span>
      <button class="btn-icon" id="btn-refresh-bounties" title="Refresh">&#8635;</button>
    </div>
    <div class="bounty-summary" id="bounties-summary"></div>
    <div class="bounty-list" id="bounties-list">Loading...</div>
  </div>

  <!-- Center: Terminal -->
  <div class="main-panel">
    <div class="terminal" id="terminal">
      <div class="terminal-welcome">
        <div class="welcome-title">Agent Team Supervisor</div>
        <div class="welcome-hint">Click <span class="kbd">+</span> next to a repo to create an agent</div>
      </div>
    </div>
  </div>

  <!-- Right: Repos accordion with agents -->
  <div class="repos-panel">
    <div class="panel-header">
      <span class="panel-title">Repos &amp; Agents</span>
      <button class="btn-icon" id="btn-refresh-repos" title="Refresh">&#8635;</button>
    </div>
    <div class="repos-list" id="repos-list"></div>
  </div>

</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span>Settings</span>
      <button class="btn-icon" id="btn-close-settings">&times;</button>
    </div>
    <div class="modal-body">
      <div class="side-field">
        <label>Bounty Board API URL</label>
        <input type="text" id="input-api-url" placeholder="http://localhost:8000">
      </div>
      <div class="side-field">
        <label>GitHub Personal Access Token</label>
        <div class="token-row">
          <input type="password" id="input-gh-token" placeholder="ghp_...">
          <button class="btn btn-sm" id="btn-save-token">Save</button>
        </div>
        <div class="side-hint">Stored locally in ~/.agent-team/tracker.json</div>
      </div>
    </div>
  </div>
</div>

<!-- Role picker popup -->
<div class="role-picker" id="role-picker" style="display:none">
  <div class="role-picker-title">Create Agent</div>
  <div class="role-picker-grid" id="role-picker-grid"></div>
</div>

<script>
const api = window.bridge;

const ROLES = ['be', 'fe', 'ops', 'arch', 'design', 'qa', 'debug', 'pm'];

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let activeAgentId = null;
let agents = {};
let trackerState = null;
let collapsedRepos = {};

const terminals = {};

// ---------------------------------------------------------------------------
// Role picker
// ---------------------------------------------------------------------------
let pickerRepo = null;

function showRolePicker(repoSlug, anchorEl) {
  pickerRepo = repoSlug;
  const picker = document.getElementById('role-picker');
  const grid = document.getElementById('role-picker-grid');
  grid.innerHTML = ROLES.map(r =>
    `<button class="role-picker-btn" data-role="${r}">${r.toUpperCase()}</button>`
  ).join('');
  const rect = anchorEl.getBoundingClientRect();
  picker.style.top = rect.bottom + 4 + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  picker.style.display = 'block';
}

function hideRolePicker() {
  document.getElementById('role-picker').style.display = 'none';
  pickerRepo = null;
}

document.getElementById('role-picker-grid').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-role]');
  if (!btn || !pickerRepo) return;
  const role = btn.dataset.role;
  const repo = pickerRepo;
  hideRolePicker();
  try {
    const result = await api.createAgent(role, repo);
    if (result.ok) {
      setTimeout(async () => {
        await refreshAgents();
        selectAgent(result.agent_id);
      }, 300);
    }
  } catch (err) {
    console.error('createAgent error:', err);
  }
});

document.addEventListener('click', (e) => {
  const picker = document.getElementById('role-picker');
  if (picker.style.display !== 'none' && !picker.contains(e.target) && !e.target.closest('.repo-group-add')) {
    hideRolePicker();
  }
});

// ---------------------------------------------------------------------------
// Settings modal
// ---------------------------------------------------------------------------

document.getElementById('btn-settings').addEventListener('click', () => {
  const modal = document.getElementById('settings-modal');
  modal.style.display = modal.style.display === 'none' ? 'flex' : 'none';
  if (trackerState) {
    const urlInput = document.getElementById('input-api-url');
    if (!urlInput.dataset.userEdited) urlInput.value = trackerState.api_url || 'http://localhost:8000';
  }
});

document.getElementById('btn-close-settings').addEventListener('click', () => {
  document.getElementById('settings-modal').style.display = 'none';
});

document.getElementById('settings-modal').addEventListener('click', (e) => {
  if (e.target.id === 'settings-modal') e.target.style.display = 'none';
});

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------

function formatUptime(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  const rm = m % 60;
  return `${h}h${rm > 0 ? rm + 'm' : ''}`;
}

function statusDot(status) {
  if (['polling', 'working', 'sleeping'].includes(status)) return 'dot-ok';
  if (status === 'starting' || status === 'restarting') return 'dot-info';
  if (status === 'rate_limited') return 'dot-warn';
  if (status === 'error') return 'dot-error';
  return 'dot-dead';
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ---------------------------------------------------------------------------
// Bounties panel (left)
// ---------------------------------------------------------------------------

function renderBounties() {
  if (!trackerState) return;

  const summaryEl = document.getElementById('bounties-summary');
  const bounties = trackerState.bounties || [];
  const ready = bounties.filter(b => b.status === 'ready').length;
  const blocked = bounties.filter(b => b.status === 'blocked').length;
  const review = bounties.filter(b => b.status === 'review').length;
  summaryEl.innerHTML = `
    <span class="badge badge-green">${ready} ready</span>
    <span class="badge badge-yellow">${blocked} blocked</span>
    <span class="badge badge-blue">${review} review</span>
    <span class="side-muted">${bounties.length} total</span>
  `;

  const listEl = document.getElementById('bounties-list');
  if (bounties.length > 0) {
    const sorted = [...bounties].sort((a, b) => {
      const order = { ready: 0, claimed: 1, blocked: 2, review: 3 };
      return (order[a.status] ?? 4) - (order[b.status] ?? 4);
    });
    listEl.innerHTML = sorted.slice(0, 50).map(b => {
      const statusCls = { ready: 'badge-green', blocked: 'badge-yellow', review: 'badge-blue', claimed: 'badge-purple' }[b.status] || '';
      const repo = (b._repo || '').split('/')[1] || '';
      const ghUrl = b._repo ? `https://github.com/${b._repo}/issues/${b.number}` : '';
      return `
        <a class="side-item side-link" href="${ghUrl}" target="_blank">
          <div class="side-item-title">#${b.number} ${escapeHtml(b.title || '')}</div>
          <div class="side-item-meta">
            <span class="badge ${statusCls}">${b.status}</span>
            <span class="badge">${b.agent_type}</span>
            <span class="side-muted">${repo}</span>
          </div>
        </a>
      `;
    }).join('');
  } else if (trackerState.error) {
    listEl.innerHTML = `<div class="side-muted" style="padding:8px">Error: ${escapeHtml(trackerState.error)}</div>`;
  } else {
    listEl.innerHTML = '<div class="side-muted" style="padding:8px">No bounties</div>';
  }
}

// ---------------------------------------------------------------------------
// Repos + Agents panel (center-left accordion)
// ---------------------------------------------------------------------------

let lastReposKey = '';

function renderRepos() {
  const listEl = document.getElementById('repos-list');
  const agentList = Object.values(agents);

  // All registered repos
  const allRepos = (trackerState && trackerState.repos) ? trackerState.repos.map(r => r.slug) : [];
  for (const a of agentList) {
    if (a.repo && !allRepos.includes(a.repo)) allRepos.push(a.repo);
  }

  // Bounty & issue counts per repo
  const repoInfo = {};
  if (trackerState && trackerState.repo_statuses) {
    for (const rs of trackerState.repo_statuses) {
      repoInfo[rs.slug] = rs;
    }
  }

  // Group agents by repo
  const byRepo = {};
  for (const repo of allRepos) byRepo[repo] = [];
  for (const a of agentList) {
    const repo = a.repo || 'unknown';
    if (!byRepo[repo]) byRepo[repo] = [];
    byRepo[repo].push(a);
  }

  const reposKey = JSON.stringify({ allRepos, ag: agentList.map(a => `${a.agent_id}:${a.status}:${a.cycle}`), activeAgentId, collapsedRepos });
  if (reposKey === lastReposKey) return;
  lastReposKey = reposKey;

  if (allRepos.length === 0) {
    listEl.innerHTML = '<div style="padding:20px 10px;color:#444;font-size:11px;text-align:center">No repos registered</div>';
    return;
  }

  let html = '';
  for (const repo of allRepos) {
    const repoAgents = byRepo[repo] || [];
    const repoName = repo.split('/')[1] || repo;
    const isCollapsed = collapsedRepos[repo];
    const aliveCount = repoAgents.filter(a => !['dead', 'error'].includes(a.status)).length;
    const rs = repoInfo[repo];
    const ghBase = `https://github.com/${repo}`;

    // Collapsed summary
    const summaryParts = [];
    if (repoAgents.length > 0) summaryParts.push(`${aliveCount} agent${aliveCount !== 1 ? 's' : ''}`);
    if (rs && rs.bounties.ready > 0) summaryParts.push(`${rs.bounties.ready} ready`);
    if (rs && rs.issues_open > 0) summaryParts.push(`${rs.issues_open} issues`);
    const summaryText = summaryParts.join(' · ') || 'empty';

    html += `
      <div class="repo-group ${isCollapsed ? '' : 'repo-group-open'}">
        <div class="repo-group-header" data-repo="${repo}">
          <span class="repo-group-chevron ${isCollapsed ? 'collapsed' : ''}">&#9662;</span>
          <div class="repo-group-title">
            <span class="repo-group-name">${escapeHtml(repoName)}</span>
            <span class="repo-group-summary">${summaryText}</span>
          </div>
          <button class="repo-group-add" data-add-repo="${repo}" title="Add agent">+</button>
        </div>
    `;

    if (!isCollapsed) {
      html += '<div class="repo-group-body">';

      // Repo links
      html += `
        <div class="repo-detail-links">
          <a href="${ghBase}" target="_blank">GitHub</a>
          <a href="${ghBase}/issues" target="_blank">${rs ? rs.issues_open : '?'} issues</a>
          <a href="${ghBase}/pulls" target="_blank">${rs ? rs.prs_open : '?'} PRs</a>
        </div>
      `;

      // Active issues (from bounties)
      if (rs && rs.bounties.total > 0) {
        const repoBounties = (trackerState.bounties || []).filter(b => b._repo === repo);
        if (repoBounties.length > 0) {
          html += '<div class="repo-detail-section-title">Active Issues</div>';
          for (const b of repoBounties.slice(0, 8)) {
            const statusCls = { ready: 'badge-green', blocked: 'badge-yellow', review: 'badge-blue', claimed: 'badge-purple' }[b.status] || '';
            html += `
              <a class="repo-detail-item side-link" href="${ghBase}/issues/${b.number}" target="_blank">
                <span class="repo-detail-item-title">#${b.number} ${escapeHtml(b.title || '')}</span>
                <span class="badge ${statusCls}">${b.status}</span>
              </a>
            `;
          }
        }
      }

      // Agent tabs
      if (repoAgents.length > 0) {
        html += '<div class="repo-detail-section-title">Agents</div>';
        for (const a of repoAgents) {
          const isActive = a.agent_id === activeAgentId;
          const alive = !['dead', 'error'].includes(a.status);
          const healthClass = alive ? 'health-alive' : 'health-dead';
          const dot = statusDot(a.status);
          const uptime = a.created_at ? formatUptime(Date.now() - a.created_at) : '';

          html += `
            <div class="agent-tab ${isActive ? 'agent-tab-active' : ''} ${a.status === 'dead' ? 'agent-tab-dead' : ''}"
                 data-agent-id="${a.agent_id}">
              <span class="agent-tab-health ${healthClass}"></span>
              <div class="agent-tab-info">
                <span class="agent-tab-role">${a.role.toUpperCase()} #${a.cycle || 0}</span>
                <span class="agent-tab-meta">
                  <span class="agent-tab-id">${a.agent_id}</span>
                  <span class="agent-tab-uptime">${uptime}</span>
                </span>
              </div>
              <span class="agent-tab-status ${dot}">&bull;</span>
              <button class="agent-tab-close" data-close-agent="${a.agent_id}">&times;</button>
            </div>
          `;
        }
      }

      if (repoAgents.length === 0 && (!rs || rs.bounties.total === 0)) {
        html += '<div class="repo-group-empty">No activity</div>';
      }

      html += '</div>'; // repo-group-body
    }

    html += '</div>'; // repo-group
  }

  listEl.innerHTML = html;
}

// Event delegation for repos panel
document.getElementById('repos-list').addEventListener('click', (e) => {
  const addBtn = e.target.closest('[data-add-repo]');
  if (addBtn) {
    e.stopPropagation();
    showRolePicker(addBtn.dataset.addRepo, addBtn);
    return;
  }
  const closeBtn = e.target.closest('[data-close-agent]');
  if (closeBtn) {
    e.stopPropagation();
    stopAgent(closeBtn.dataset.closeAgent);
    return;
  }
  const repoHeader = e.target.closest('.repo-group-header');
  if (repoHeader && !e.target.closest('.repo-group-add')) {
    const repo = repoHeader.dataset.repo;
    collapsedRepos[repo] = !collapsedRepos[repo];
    lastReposKey = '';
    renderRepos();
    return;
  }
  const tab = e.target.closest('.agent-tab');
  if (tab) selectAgent(tab.dataset.agentId);
});

// ---------------------------------------------------------------------------
// Terminal
// ---------------------------------------------------------------------------

function getOrCreateTerminal(agentId) {
  if (terminals[agentId]) return terminals[agentId];

  const term = new window.Terminal({
    theme: {
      background: '#0e0e0e',
      foreground: '#e0e0e0',
      cursor: '#4ade80',
      selectionBackground: '#4ade8033',
    },
    fontSize: 12,
    fontFamily: 'Menlo, Monaco, "Courier New", monospace',
    cursorBlink: true,
    scrollback: 5000,
    convertEol: true,
  });

  const fitAddon = new window.FitAddon.FitAddon();
  term.loadAddon(fitAddon);

  term.onData((data) => {
    api.writeAgentInput(agentId, data);
  });

  terminals[agentId] = { term, fitAddon };
  return terminals[agentId];
}

function renderTerminal() {
  const container = document.getElementById('terminal');

  if (!activeAgentId) {
    Object.values(terminals).forEach(t => { if (t.term.element) t.term.element.parentElement.style.display = 'none'; });
    container.innerHTML = `
      <div class="terminal-welcome">
        <div class="welcome-title">Agent Team Supervisor</div>
        <div class="welcome-hint">Click <span class="kbd">+</span> next to a repo to create an agent</div>
      </div>`;
    return;
  }

  const welcome = container.querySelector('.terminal-welcome');
  if (welcome) welcome.remove();

  const { term, fitAddon } = getOrCreateTerminal(activeAgentId);

  Object.entries(terminals).forEach(([id, t]) => {
    if (t.term.element && t.term.element.parentElement) {
      t.term.element.parentElement.style.display = id === activeAgentId ? '' : 'none';
    }
  });

  if (!term.element) {
    const wrapper = document.createElement('div');
    wrapper.className = 'xterm-wrapper';
    wrapper.dataset.agentId = activeAgentId;
    container.appendChild(wrapper);
    term.open(wrapper);
    fitAddon.fit();
  } else if (!term.element.parentElement.parentElement) {
    container.appendChild(term.element.parentElement);
  }

  term.element.parentElement.style.display = '';
  fitAddon.fit();
  term.focus();
}

function updateHealthBar() {
  const ht = document.getElementById('health-text');
  const agentList = Object.values(agents);
  const alive = agentList.filter(a => !['dead','restarting'].includes(a.status)).length;
  const total = agentList.length;
  const cost = agentList.reduce((s, a) => s + (a.cost_usd || 0), 0);

  const parts = [];
  if (total > 0) parts.push(`${alive}/${total} alive`);
  if (cost > 0) parts.push(`$${cost.toFixed(2)}`);
  if (trackerState && trackerState.bounties) {
    const ready = trackerState.bounties.filter(b => b.status === 'ready').length;
    if (ready > 0) parts.push(`${ready} bounties ready`);
  }
  ht.textContent = parts.length > 0 ? parts.join(' · ') : 'Agent Team';
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

async function selectAgent(id) {
  activeAgentId = id;
  renderRepos();
  renderTerminal();
}

async function stopAgent(id) {
  await api.stopAgent(id);
  if (terminals[id]) {
    const wrapper = terminals[id].term.element?.parentElement;
    terminals[id].term.dispose();
    if (wrapper) wrapper.remove();
    delete terminals[id];
  }
  lastReposKey = '';
  delete agents[id];
  if (activeAgentId === id) {
    const remaining = Object.keys(agents);
    activeAgentId = remaining.length > 0 ? remaining[0] : null;
  }
  await refreshAgents();
  renderRepos();
  renderTerminal();
}

async function refreshAgents() {
  const list = await api.getAgents();
  agents = {};
  for (const a of list) agents[a.agent_id] = a;
  updateHealthBar();
  renderRepos();
}

// ---------------------------------------------------------------------------
// Real-time events
// ---------------------------------------------------------------------------

api.onPtyData((agentId, data) => {
  const t = getOrCreateTerminal(agentId);
  t.term.write(data);
});

api.onStatusUpdate((agentId, data) => {
  if (data) {
    agents[agentId] = data;
    if (!activeAgentId) selectAgent(agentId);
  }
  updateHealthBar();
  renderRepos();
});

api.onTrackerUpdate((state) => {
  trackerState = state;
  updateHealthBar();
  renderBounties();
  renderRepos();
});

new ResizeObserver(() => {
  if (activeAgentId && terminals[activeAgentId]) {
    terminals[activeAgentId].fitAddon.fit();
  }
}).observe(document.getElementById('terminal'));

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

document.getElementById('btn-save-token').addEventListener('click', () => {
  const token = document.getElementById('input-gh-token').value.trim();
  api.setGitHubToken(token);
  document.getElementById('input-gh-token').value = '';
  document.getElementById('input-gh-token').placeholder = '••••••••  (saved)';
});

document.getElementById('input-api-url').addEventListener('change', (e) => {
  e.target.dataset.userEdited = 'true';
  api.setApiUrl(e.target.value.trim());
});

document.getElementById('btn-refresh-bounties').addEventListener('click', () => api.refreshTracker());
document.getElementById('btn-refresh-repos').addEventListener('click', () => api.refreshTracker());

refreshAgents();
api.getTracker().then(state => {
  trackerState = state;
  updateHealthBar();
  renderBounties();
  renderRepos();
});
setInterval(refreshAgents, 10_000);
setInterval(() => {
  document.querySelectorAll('.agent-tab-uptime').forEach(el => {
    const tab = el.closest('.agent-tab');
    if (!tab) return;
    const agentId = tab.dataset.agentId;
    const a = agents[agentId];
    if (a && a.created_at) {
      el.textContent = formatUptime(Date.now() - a.created_at);
    }
  });
}, 1000);

</script>

</body>
</html>
